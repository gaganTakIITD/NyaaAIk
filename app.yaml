# Databricks Apps runtime — must live at the repository root.
# https://docs.databricks.com/aws/en/dev-tools/databricks-apps/app-runtime
command: ["python", "app/main.py"]

env:
  # LLM via Databricks AI Gateway (Llama 4 Maverick)
  # UPDATE: Replace with YOUR workspace AI Gateway URL
  - name: "LLM_OPENAI_BASE_URL"
    value: "YOUR_WORKSPACE_AI_GATEWAY_URL"
  - name: "LLM_MODEL"
    value: "databricks-llama-4-maverick"

  # Vector Search (primary backend — BNS/Constitution)
  - name: "NYAYA_RETRIEVAL_BACKEND"
    value: "vector_search"
  - name: "NYAYA_VS_ENDPOINT_NAME"
    value: "nyaya_vs_endpoint"
  - name: "NYAYA_VS_INDEX_NAME"
    value: "main.india_legal.legal_rag_corpus_index"
